name: "Release"
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build & Release
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MRO-ERP ${{ github.ref_name }}"
          releaseBody: |
            ## MRO-ERP ${{ github.ref_name }}
            - 下载 `MRO-ERP_${{ github.ref_name }}_x64-setup.exe` 安装包
            - 应用内自动更新
          releaseDraft: false
          prerelease: false

      - name: Upload latest.json to gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SHA256=$(certutil -hashfile "src-tauri/target/release/bundle/nsis/MRO-ERP_${VERSION}_x64-setup.exe" SHA256 | findstr /v "SHA256" | findstr /v "CertUtil" | findstr /v "^$" | tr -d ' \r\n')
          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "url": "https://github.com/wsxvg/MRO/releases/download/${{ github.ref_name }}/MRO-ERP_${VERSION}_x64-setup.exe",
            "signature": ""
          }
          EOF
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest.json
          git commit -m "chore: update latest.json for ${{ github.ref_name }}"
          git push origin gh-pages
