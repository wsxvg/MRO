name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mro-erp/package-lock.json

      - name: Install npm dependencies
        working-directory: mro-erp
        run: npm ci

      - name: Build Tauri app
        working-directory: mro-erp
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Extract version and signature
        id: info
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          $exePath = "mro-erp/src-tauri/target/release/bundle/nsis/MRO-ERP_${ver}_x64-setup.exe"
          $sigPath = "${exePath}.sig"
          echo "EXE_PATH=$exePath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          echo "SIG_PATH=$sigPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Read signature
        id: signature
        shell: pwsh
        run: |
          $sig = (Get-Content -Path "${{ steps.info.outputs.SIG_PATH }}" -Raw).Trim()
          echo "SIGNATURE=$sig" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.info.outputs.EXE_PATH }}
            ${{ steps.info.outputs.SIG_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Generate updater JSON
        shell: pwsh
        run: |
          $json = @{
            version = "${{ steps.info.outputs.VERSION }}"
            notes = "Release ${{ github.ref_name }}"
            pub_date = (Get-Date -Format "o")
            platforms = @{
              "windows-x86_64" = @{
                signature = "${{ steps.signature.outputs.SIGNATURE }}"
                url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/MRO-ERP_${{ steps.info.outputs.VERSION }}_x64-setup.exe"
              }
            }
          }
          New-Item -ItemType Directory -Force -Path "update-www" | Out-Null
          $json | ConvertTo-Json -Depth 5 | Out-File -FilePath "update-www\latest.json" -Encoding utf8

      - name: Deploy updater JSON to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./update-www
          keep_files: false
